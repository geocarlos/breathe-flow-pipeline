server {
    listen 80;
    server_name kestra.letterscode.com;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name kestra.letterscode.com;

    ssl_certificate /etc/letsencrypt/live/kestra.letterscode.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/kestra.letterscode.com/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 100M;

    location / {
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_pass http://127.0.0.1:8080;
    }

    # Health endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        proxy_set_header Host $host;
    }

    # Optional: limit access to management port if exposed
    location /management/ {
        proxy_pass http://127.0.0.1:8081/;
        proxy_set_header Host $host;
    }
}
