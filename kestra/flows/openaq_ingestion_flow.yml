id: openaq_ingestion
namespace: breatheflow
description: "Kestra flow to ingest OpenAQ air quality station snapshots into GCS."

tasks:
  - id: run-ingest
    type: io.kestra.plugin.scripts.shell.Commands
    runner: PROCESS
    commands:
      - |
        OPENAQ_KEY=$(python3 /opt/app/get_secret.py)
        TOKEN=$(python3 /opt/app/get_id_token.py https://openaq-ingest-194296449561.us-east1.run.app)
        curl -s -H "Authorization: Bearer $TOKEN" -H "X-OPENAQ-API-KEY: $OPENAQ_KEY" -X POST https://openaq-ingest-194296449561.us-east1.run.app/run -o /tmp/ingest_resp.json || true
        cat /tmp/ingest_resp.json || true
    env:
      GCP_PROJECT_ID: "{{ envs.GCP_PROJECT_ID }}"
      GCS_BUCKET_NAME: "{{ envs.GCS_BUCKET_NAME }}"

triggers:
  - id: hourly
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 * * * *"
    timezone: UTC
