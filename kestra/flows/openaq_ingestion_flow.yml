id: openaq_ingestion
namespace: breatheflow
revision: 1
description: "Simple Kestra flow to run the OpenAQ ingestion script (PoC)."
tasks:
  - id: run-ingest
    type: io.kestra.core.tasks.scripts.Bash
    command: |
      set -e
      echo "Starting OpenAQ ingestion"
      python /opt/app/ingest_openaq.py
    environment:
      OPENAQ_API_KEY: ${OPENAQ_API_KEY}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID}
      GCS_BUCKET_NAME: ${GCS_BUCKET_NAME}
      GOOGLE_APPLICATION_CREDENTIALS: /opt/app/google_credentials.json
schedules:
  - id: hourly
    type: io.kestra.core.models.tasks.types.Schedule
    cron: "0 * * * *"
    timezone: "UTC"
