id: openaq_to_bigquery
namespace: breatheflow
description: "Ingest OpenAQ station snapshots, load to BigQuery, and run dbt transformations."

tasks:
  - id: run-ingest
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        set -euo pipefail
        echo "Getting ID token..."
        TOKEN=$(python3 /opt/app/get_id_token.py https://openaq-ingest-194296449561.us-east1.run.app)
        echo "Getting OpenAQ API key..."
        KEY=$(python3 /opt/app/get_secret.py)
        echo "Triggering Cloud Run ingestion..."
        curl -sSf -X POST "https://openaq-ingest-194296449561.us-east1.run.app/run" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "X-OPENAQ-API-KEY: ${KEY}" \
          -H "Content-Type: application/json" \
          -d '{}' || true
        echo "Waiting for ingestion to land in GCS..."
        sleep 15
        echo "Checking BigQuery for loaded rows..."
        python3 /opt/app/check_bq_load.py \
          --project "${GCP_PROJECT_ID}" \
          --dataset "${BQ_SOURCE_DATASET}" \
          --table "${BQ_TABLE}" \
          --min-rows 1
    env:
      GCP_PROJECT_ID: "{{ envs.GCP_PROJECT_ID }}"
      BQ_SOURCE_DATASET: "{{ envs.BQ_SOURCE_DATASET }}"
      BQ_TABLE: "{{ envs.BQ_TABLE }}"

  - id: run-dbt
    type: io.kestra.plugin.scripts.shell.Commands
    commands:
      - |
        set -euo pipefail
        echo "Running dbt models..."
        dbt run \
          --project-dir /opt/app/dbt \
          --profiles-dir /opt/app/.dbt \
          --target prod
        echo "Running dbt tests..."
        dbt test \
          --project-dir /opt/app/dbt \
          --profiles-dir /opt/app/.dbt \
          --target prod
    env:
      GCP_PROJECT_ID: "{{ envs.GCP_PROJECT_ID }}"
      BQ_DATASET: "{{ envs.BQ_DATASET }}"
      BQ_SOURCE_DATASET: "{{ envs.BQ_SOURCE_DATASET }}"
      GOOGLE_APPLICATION_CREDENTIALS: "/root/.gcp/service-account.json"

triggers:
  - id: hourly
    type: io.kestra.core.models.triggers.types.Schedule
    cron: "0 * * * *"
    timezone: UTC
