version: '3.8'

services:
  kestra_postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: kestra_password
    volumes:
      - kestra_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d kestra -U kestra"]
      interval: 30s
      timeout: 10s
      retries: 10
    networks:
      - n8n-compose_default

  kestra:
    image: geowildcat/kestra:latest
    user: "root"
    command: ["server", "standalone"]
    volumes:
      - ./kestra_data:/app/storage
      - /var/run/docker.sock:/var/run/docker.sock
      - ./scripts:/opt/app
      - ./dbt:/opt/app/dbt:ro
      - ./dbt/profiles.yml:/opt/app/.dbt/profiles.yml:ro
      - ./google_credentials.json:/opt/app/google_credentials.json:ro
      - ./google_credentials.json:/root/.gcp/service-account.json:ro
    environment:
      JAVA_OPTS: "-Xmx1024m -Xms512m"
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: kestra_password
        kestra:
          server:
            basicAuth:
              username: "geowildcat@gmail.com"
              password: "Admin1234!"
          repository:
            type: postgres
          storage:
            type: local
            local:
              basePath: "/app/storage"
          queue:
            type: postgres
          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp
        # Micronaut file watching enables local flow synchronization from disk into the repository
        micronaut:
          io:
            watch:
              enabled: true
              paths:
                - /app/flows              
        url: http://0.0.0.0:8080/
      GOOGLE_APPLICATION_CREDENTIALS: "/root/.gcp/service-account.json"
    
    labels:
      - "traefik.enable=true"
      - 'traefik.http.routers.kestra.rule=Host(`kestra.letterscode.com`)'
      - "traefik.http.routers.kestra.entrypoints=websecure"
      - "traefik.http.routers.kestra.tls=true"
      - "traefik.http.routers.kestra.tls.certresolver=mytlschallenge"
      - "traefik.http.services.kestra.loadbalancer.server.port=8080"
    networks:
      - n8n-compose_default
    restart: unless-stopped
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      - kestra_postgres
    # Docker Compose memory hint (may be ignored outside swarm)
    deploy:
      resources:
        limits:
          memory: 800M
    mem_limit: 800m

volumes:
  kestra_postgres_data:
    driver: local
  kestra_data:
    driver: local

networks:
  n8n-compose_default:
    external: true
    name: n8n-compose_default
